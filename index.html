<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mestre dos Verbos - Conjugação Completa</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="card">
      <h1 class="app-title">Mestre dos Verbos</h1>
      <p class="app-subtitle">Treino de Conjugação Completa</p>

      <div class="input-section">
        <label for="verb-input">Verbo para praticar:</label>
        <input
          type="text"
          id="verb-input"
          placeholder="Ex: Estar, Ter, Falar..."
        />
      </div>

      <div id="display-area">
        <p id="display-text">Clique no botão para gerar o desafio</p>
      </div>

      <button class="btn-generate" id="generateBtn">🎲 Gerar Desafio</button>

      <div class="settings-section">
        <h3>Selecione as Pessoas</h3>
        <div class="checkbox-group person-group">
          <label
            ><input type="checkbox" name="person" value="Eu" checked />
            Eu</label
          >
          <label><input type="checkbox" name="person" value="Tu" /> Tu</label>
          <label
            ><input
              type="checkbox"
              name="person"
              value="Você / Ele / Ela / A gente"
              checked
            />
            Você / Ele / Ela / A gente</label
          >
          <label
            ><input type="checkbox" name="person" value="Nós" checked />
            Nós</label
          >
          <label><input type="checkbox" name="person" value="Vós" /> Vós</label>
          <label
            ><input
              type="checkbox"
              name="person"
              value="Vocês / Eles / Elas"
              checked
            />
            Vocês / Eles / Elas</label
          >
        </div>

        <h3 class="section-divider">Configuração de Tempos (Modos)</h3>

        <div class="mode-container">
          <h4>Modo Indicativo</h4>
          <div class="checkbox-group">
            <label
              ><input
                type="checkbox"
                name="tense"
                value="Presente (Ind.)"
                checked
              />
              Presente</label
            >
            <label
              ><input
                type="checkbox"
                name="tense"
                value="Pretérito Perfeito (Ind.)"
                checked
              />
              Pretérito Perfeito</label
            >
            <label
              ><input
                type="checkbox"
                name="tense"
                value="Pretérito Imperfeito (Ind.)"
              />
              Pretérito Imperfeito</label
            >
            <label
              ><input
                type="checkbox"
                name="tense"
                value="Pretérito Mais-que-perfeito (Ind.)"
              />
              Pretérito Mais-que-perfeito</label
            >
            <label
              ><input
                type="checkbox"
                name="tense"
                value="Futuro do Presente (Ind.)"
              />
              Futuro do Presente</label
            >
            <label
              ><input
                type="checkbox"
                name="tense"
                value="Futuro do Pretérito (Ind.)"
              />
              Futuro do Pretérito</label
            >
            <hr />
            <label class="compound"
              ><input
                type="checkbox"
                name="tense"
                value="Pret. Perfeito Composto (Ind.)"
              />
              Pret. Perfeito Composto</label
            >
            <label class="compound"
              ><input
                type="checkbox"
                name="tense"
                value="Pret. M-q-P Composto (Ind.)"
              />
              Pret. M-q-P Composto</label
            >
            <label class="compound"
              ><input
                type="checkbox"
                name="tense"
                value="Futuro do Presente Comp. (Ind.)"
              />
              Futuro do Presente Comp.</label
            >
            <label class="compound"
              ><input
                type="checkbox"
                name="tense"
                value="Futuro do Pretérito Comp. (Ind.)"
              />
              Futuro do Pretérito Comp.</label
            >
          </div>
        </div>

        <div class="mode-container">
          <h4>Modo Subjuntivo</h4>
          <div class="checkbox-group">
            <label
              ><input type="checkbox" name="tense" value="Presente (Subj.)" />
              Presente</label
            >
            <label
              ><input
                type="checkbox"
                name="tense"
                value="Pretérito Imperfeito (Subj.)"
              />
              Pretérito Imperfeito</label
            >
            <label
              ><input type="checkbox" name="tense" value="Futuro (Subj.)" />
              Futuro</label
            >
            <hr />
            <label class="compound"
              ><input
                type="checkbox"
                name="tense"
                value="Pret. Perfeito Comp. (Subj.)"
              />
              Pret. Perfeito Comp.</label
            >
            <label class="compound"
              ><input
                type="checkbox"
                name="tense"
                value="Pret. M-q-P Comp. (Subj.)"
              />
              Pret. M-q-P Comp.</label
            >
            <label class="compound"
              ><input
                type="checkbox"
                name="tense"
                value="Futuro Composto (Subj.)"
              />
              Futuro Composto</label
            >
          </div>
        </div>

        <div class="mode-container">
          <h4>Formas Nominais & Imperativo</h4>
          <div class="checkbox-group">
            <label
              ><input
                type="checkbox"
                name="tense"
                value="Infinitivo Impessoal"
              />
              Infinitivo Impessoal</label
            >
            <label
              ><input type="checkbox" name="tense" value="Gerúndio" />
              Gerúndio</label
            >
            <label
              ><input type="checkbox" name="tense" value="Particípio Passado" />
              Particípio Passado</label
            >
            <hr />
            <label
              ><input type="checkbox" name="tense" value="Infinitivo Pessoal" />
              Infinitivo Pessoal</label
            >
            <label class="compound"
              ><input
                type="checkbox"
                name="tense"
                value="Infinitivo Pessoal Composto"
              />
              Infinitivo Pessoal Comp.</label
            >
            <label
              ><input
                type="checkbox"
                name="tense"
                value="Imperativo Afirmativo"
              />
              Imperativo Afirmativo</label
            >
            <label
              ><input
                type="checkbox"
                name="tense"
                value="Imperativo Negativo"
              />
              Imperativo Negativo</label
            >
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
